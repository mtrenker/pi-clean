name: Feature request
description: Propose a new capability or behavior
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the user or operator outcome rather than only an implementation.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this needed, and what existing alternatives were considered?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
      placeholder: |
        In scope:
        - ...

        Not in scope:
        - ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Observable behavior one
        - [ ] Required validation is documented and passes
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and risks
      description: Link blockers and describe compatibility, security, or migration concerns.
