version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /opt
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /run/openshell-browser
    - /var/lib/openshell-browser
landlock:
  compatibility: best_effort
process:
  run_as_user: 2000
  run_as_group: 2000
network_policies: {}
