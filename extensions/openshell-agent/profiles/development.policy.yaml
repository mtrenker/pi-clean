version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# GitHub access is contributed by the explicitly attached Providers v2
# instance. The built-in GitHub profile is read-oriented. Any credential reach
# or write-capability expansion remains a manual Policy Advisor decision.
network_policies: {}
