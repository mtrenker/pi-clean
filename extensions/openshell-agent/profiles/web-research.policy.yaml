version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# Deliberately provider-free and deny-first. The Policy Advisor may propose
# narrow binary-bound research access. OpenShell auto mode only approves an
# empty prover delta; credential or capability expansion remains pending.
network_policies: {}
